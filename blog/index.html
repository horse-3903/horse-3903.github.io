882"},{"id":"fundamentals/math/probability/entropy-cross-entropy-kl-divergence.md","title":"Entropy, Cross-Entropy, and KL Divergence","description":"Math fundamentals note for ML preparation.","category":"ML Notes","tags":["mathematics fundamentals","probability"],"published":"16 Feb 2026","url":"/blog/fundamentals/math/probability/entropy-cross-entropy-kl-divergence","accent":"#c4a882"},{"id":"fundamentals/math/probability/fundamentals.md","title":"Probability Fundamentals for ML","description":"Core probability and statistics concepts needed to understand ML topics.","category":"ML Notes","tags":["mathematics fundamentals","probability"],"published":"16 Feb 2026","url":"/blog/fundamentals/math/probability/fundamentals","accent":"#c4a882"},{"id":"fundamentals/math/probability/likelihood-log-likelihood-and-mle.md","title":"Likelihood, Log-Likelihood, and MLE","description":"Math fundamentals note for ML preparation.","category":"ML Notes","tags":["mathematics fundamentals","probability"],"published":"16 Feb 2026","url":"/blog/fundamentals/math/probability/likelihood-log-likelihood-and-mle","accent":"#c4a882"},{"id":"fundamentals/math/probability/random-variables-expectation-variance.md","title":"Random Variables, Expectation, and Variance","description":"Math fundamentals note for ML preparation.","category":"ML Notes","tags":["mathematics fundamentals","probability"],"published":"16 Feb 2026","url":"/blog/fundamentals/math/probability/random-variables-expectation-variance","accent":"#c4a882"},{"id":"fundamentals/math/probability/statistical-inference-basics.md","title":"Statistical Inference Basics","description":"Math fundamentals note for ML preparation.","category":"ML Notes","tags":["mathematics fundamentals","probability"],"published":"16 Feb 2026","url":"/blog/fundamentals/math/probability/statistical-inference-basics","accent":"#c4a882"},{"id":"fundamentals/math/probability/sampling-and-data-splits.md","title":"Sampling and Data Splits","description":"Math fundamentals note for ML preparation.","category":"ML Notes","tags":["mathematics fundamentals","probability"],"published":"16 Feb 2026","url":"/blog/fundamentals/math/probability/sampling-and-data-splits","accent":"#c4a882"},{"id":"h3-game-theory/session-1.md","title":"H3 Game Theory Session 1","description":"SMU H3 Game Theory Session 1 Notes","category":"SMU H3 Notes","tags":["game theory","economics","smu h3","sessions"],"published":"12 Feb 2026","url":"/blog/h3-game-theory/session-1","accent":"#c4943e"}];
const TRACKS = [{"key":"ml","label":"ML Notes","category":"ML Notes","accent":"#c4a882","dim":"rgba(196,168,130,0.10)","border":"rgba(196,168,130,0.30)","description":"ML theory, math fundamentals, and implementation notes for ML preparation","subtopics":[{"key":"study-guides","label":"Study Guides","prefix":"syllabus/"},{"key":"fundamentals","label":"Fundamentals","prefix":"fundamentals/"},{"key":"classical-ml","label":"Classical ML","prefix":"classical-ml/"},{"key":"data-science","label":"Data Science","prefix":"data-science/"},{"key":"neural-networks","label":"Neural Networks","prefix":"neural-networks/"},{"key":"computer-vision","label":"Computer Vision","prefix":"computer-vision/"},{"key":"nlp","label":"NLP","prefix":"nlp/"}],"map":{"title":"ML Study Map","href":"/blog/ml-map","desc":"100+ topics across 5 tracks"}},{"key":"h3","label":"SMU H3 Notes","category":"SMU H3 Notes","accent":"#c4943e","dim":"rgba(196,148,62,0.10)","border":"rgba(196,148,62,0.30)","description":"Session notes and study materials for SMU H3 Game Theory","subtopics":[{"key":"concepts","label":"Concepts","prefix":"h3-game-theory/chapter-"},{"key":"games","label":"Games","prefix":"h3-game-theory/games/"},{"key":"sessions","label":"Sessions","prefix":"h3-game-theory/session-"}],"map":{"title":"Game Theory Map","href":"/blog/h3-map","desc":"53 games · 11 chapters · 10 sessions"}},{"key":"journals","label":"Journals","category":"Journals","accent":"#7a9b82","dim":"rgba(122,155,130,0.10)","border":"rgba(122,155,130,0.30)","description":"Personal reflections on economics, business, and life","subtopics":[]}];

      const MAPS = TRACKS
        .filter(t => t.map)
        .map(t => ({ ...t.map, trackKey: t.key, trackLabel: t.label, accent: t.accent, dim: t.dim, border: t.border }));

      const state = {
        track: null,
        sub: null,
        search: "",
        activeTags: [],   // tag filter chips
      };

      // ── URL sync ──
      function readURL() {
        const p = new URLSearchParams(window.location.search);
        state.track  = p.get("track");
        state.sub    = p.get("sub");
        state.search = p.get("q") || "";
        state.activeTags = p.get("tags") ? p.get("tags").split(",").filter(Boolean) : [];
        document.getElementById("search-input").value = state.search;
      }
      function pushURL() {
        const p = new URLSearchParams();
        if (state.track)  p.set("track", state.track);
        if (state.sub)    p.set("sub", state.sub);
        if (state.search) p.set("q", state.search);
        if (state.activeTags.length) p.set("tags", state.activeTags.join(","));
        history.replaceState({}, "", "/blog" + (p.toString() ? "?" + p.toString() : ""));
      }

      // ── Track helpers ──
      const trackMap = Object.fromEntries(TRACKS.map(t => [t.key, t]));
      function getActiveTrack() { return state.track ? trackMap[state.track] : null; }

      // ── Filter posts ──
      function filteredPosts() {
        const at = getActiveTrack();
        let posts = postsData;
        if (at) posts = posts.filter(p => p.category === at.category);
        if (state.sub && at) {
          const sub = at.subtopics.find(s => s.key === state.sub);
          if (sub) posts = posts.filter(p => p.id.startsWith(sub.prefix));
        }
        if (state.activeTags.length) {
          posts = posts.filter(p => state.activeTags.every(tag => p.tags.includes(tag)));
        }
        if (state.search) {
          const q = state.search.toLowerCase();
          posts = posts.filter(p =>
            p.title.toLowerCase().includes(q) ||
            p.description.toLowerCase().includes(q) ||
            p.tags.some(t => t.toLowerCase().includes(q))
          );
        }
        return posts;
      }

      // ── Tag autocomplete ──
      function allTagsInScope() {
        const at = getActiveTrack();
        let base = postsData;
        if (at) base = base.filter(p => p.category === at.category);
        const counts = {};
        base.forEach(p => p.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
        return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(e => e[0]);
      }

      function renderTagDropdown() {
        const input = document.getElementById("search-input");
        const dropdown = document.getElementById("tag-dropdown");
        const q = input.value.trim().toLowerCase();
        const allTags = allTagsInScope().filter(t => !state.activeTags.includes(t));
        const matches = q ? allTags.filter(t => t.toLowerCase().includes(q)) : allTags.slice(0, 12);

        if (matches.length === 0) { dropdown.classList.add("hidden"); return; }
        const at = getActiveTrack();
        const accent = at ? at.accent : "#c4a882";

        dropdown.innerHTML = matches.map(tag => `
          <button class="tag-suggest px-2.5 py-1 text-sm rounded border transition-colors duration-150"
                  style="background: var(--surface); color: var(--text-secondary); border-color: var(--border);"
                  data-tag="${tag}" data-accent="${accent}">${tag}</button>
        `).join("");
        dropdown.classList.remove("hidden");

        dropdown.querySelectorAll(".tag-suggest").forEach(btn => {
          btn.addEventListener("mouseenter", () => { btn.style.borderColor = btn.dataset.accent; btn.style.color = btn.dataset.accent; });
          btn.addEventListener("mouseleave", () => { btn.style.borderColor = "var(--border)"; btn.style.color = "var(--text-secondary)"; });
          btn.addEventListener("click", () => {
            state.activeTags.push(btn.dataset.tag);
            input.value = "";
            state.search = "";
            dropdown.classList.add("hidden");
            pushURL(); render();
          });
        });
      }

      function renderActiveTagChips() {
        const bar = document.getElementById("active-tags");
        if (state.activeTags.length === 0) { bar.style.display = "none"; return; }
        const at = getActiveTrack();
        const accent = at ? at.accent : "#c4a882";
        bar.style.display = "flex";
        bar.innerHTML = state.activeTags.map(tag => `
          <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg text-sm border"
                style="background: ${accent}18; color: ${accent}; border-color: ${accent}40;">
            ${tag}
            <button class="remove-tag opacity-60 hover:opacity-100 transition-opacity" data-tag="${tag}" style="line-height:1;">×</button>
          </span>
        `).join("");
        bar.querySelectorAll(".remove-tag").forEach(btn => {
          btn.addEventListener("click", () => {
            state.activeTags = state.activeTags.filter(t => t !== btn.dataset.tag);
            pushURL(); render();
          });
        });
      }

      // ── Render track cards ──
      function renderTrackCards() {
        const at = getActiveTrack();
        document.querySelectorAll(".track-card").forEach(card => {
          const isActive = at && at.key === card.dataset.track;
          card.style.borderColor = isActive ? card.dataset.border : "var(--border)";
          card.style.background  = isActive ? card.dataset.dim    : "var(--surface)";
        });
      }

      // ── Render subtopic bar ──
      function renderSubtopicBar() {
        const at = getActiveTrack();
        const bar = document.getElementById("subtopic-bar");
        if (at?.subtopics?.length) {
          bar.style.display = "flex";
          document.querySelectorAll(".subtopic-chip").forEach(chip => {
            if (chip.dataset.track !== at.key) { chip.style.display = "none"; return; }
            chip.style.display = "";
            const isActive = chip.dataset.sub === state.sub;
            chip.style.borderColor = isActive ? at.accent : "var(--border)";
            chip.style.color       = isActive ? at.accent : "var(--text-secondary)";
            chip.style.background  = isActive ? at.dim    : "var(--surface)";
          });
        } else {
          bar.style.display = "none";
          document.querySelectorAll(".subtopic-chip").forEach(chip => chip.style.display = "none");
        }
      }

      // ── Render post list ──
      function renderPosts() {
        const posts = filteredPosts();
        const list  = document.getElementById("post-list");
        const empty = document.getElementById("empty-msg");

        const visibleMaps = MAPS.filter(m => !state.track || m.trackKey === state.track);

        if (posts.length === 0 && visibleMaps.length === 0) {
          list.innerHTML = ""; empty.classList.remove("hidden"); return;
        }
        empty.classList.add("hidden");

        const mapHTML = visibleMaps.map(m => `
          <a href="${m.href}" class="map-pin-row block p-5 rounded-xl border transition-all duration-200"
             style="background:${m.dim}; border-color:${m.border};"
             data-accent="${m.accent}" data-border="${m.border}">
            <div class="flex items-start justify-between gap-4">
              <div class="min-w-0">
                <span class="text-sm font-mono mb-1.5 block" style="color:${m.accent};">${m.trackLabel}</span>
                <h2 class="map-row-title" style="color:var(--text);font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;line-height:1.3;">${m.title}</h2>
                <p class="mt-1 text-sm" style="color:var(--text-muted);">${m.desc}</p>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;flex-shrink:0;padding-top:0.1rem;">
                <span style="background:${m.accent}20;color:${m.accent};border:1px solid ${m.accent}40;font-size:0.75rem;padding:0.2rem 0.5rem;border-radius:6px;white-space:nowrap;">map</span>
                <span style="font-size:0.68rem;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;opacity:0.6;white-space:nowrap;">pinned</span>
              </div>
            </div>
          </a>
        `).join("");

        list.innerHTML = mapHTML + posts.map(p => `
          <a href="${p.url}" class="post-row block p-5 rounded-xl border transition-all duration-200"
             style="background: var(--surface); border-color: var(--border);" data-accent="${p.accent}">
            <div class="flex items-start justify-between gap-4">
              <div class="min-w-0">
                ${p.category ? `<span class="text-sm font-mono mb-1.5 block" style="color:${p.accent};">${p.category}</span>` : ""}
                <h2 class="post-title" style="color:var(--text);font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;line-height:1.3;">${p.title}</h2>
                ${p.description ? `<p class="mt-1 text-sm leading-relaxed line-clamp-2" style="color:var(--text-muted);">${p.description}</p>` : ""}
                ${p.tags.length ? `<div class="flex flex-wrap gap-1.5 mt-2">${p.tags.map(t => {
                  const isActive = state.activeTags.includes(t);
                  return `<span class="tag-chip px-2 py-0.5 text-sm rounded cursor-pointer transition-colors duration-150"
                    style="background:${isActive ? p.accent+"30" : "var(--surface-hover)"}; color:${isActive ? p.accent : "var(--text-muted)"}; border:1px solid ${isActive ? p.accent+"60" : "transparent"};"
                    data-tag="${t}" data-accent="${p.accent}">${t}</span>`;
                }).join("")}</div>` : ""}
              </div>
              <time class="text-sm flex-shrink-0 pt-0.5" style="color:var(--text-muted);">${p.published}</time>
            </div>
          </a>
        `).join("");

        list.querySelectorAll(".map-pin-row").forEach(row => {
          const ac = row.dataset.accent;
          const origBorder = row.dataset.border;
          row.addEventListener("mouseenter", () => { row.style.borderColor = ac; row.style.transform = "translateY(-1px)"; row.querySelector(".map-row-title").style.color = ac; });
          row.addEventListener("mouseleave", () => { row.style.borderColor = origBorder; row.style.transform = ""; row.querySelector(".map-row-title").style.color = "var(--text)"; });
        });

        list.querySelectorAll(".post-row").forEach(row => {
          const ac = row.dataset.accent;
          row.addEventListener("mouseenter", () => { row.style.borderColor = ac+"60"; row.style.transform = "translateY(-1px)"; row.querySelector(".post-title").style.color = ac; });
          row.addEventListener("mouseleave", () => { row.style.borderColor = "var(--border)"; row.style.transform = ""; row.querySelector(".post-title").style.color = "var(--text)"; });
        });

        list.querySelectorAll(".tag-chip").forEach(chip => {
          chip.addEventListener("click", e => {
            e.preventDefault(); e.stopPropagation();
            const tag = chip.dataset.tag;
            if (!state.activeTags.includes(tag)) { state.activeTags.push(tag); pushURL(); render(); }
          });
        });
      }

      function render() {
        renderTrackCards();
        renderSubtopicBar();
        renderActiveTagChips();
        renderPosts();
      }

      // ── Events ──
      document.querySelectorAll(".track-card").forEach(card => {
        card.addEventListener("click", () => {
          const key = card.dataset.track;
          if (state.track === key) { state.track = null; state.sub = null; }
          else { state.track = key; state.sub = null; }
          state.activeTags = [];
          pushURL(); render();
        });
      });

      document.querySelectorAll(".subtopic-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          state.sub = state.sub === chip.dataset.sub ? null : chip.dataset.sub;
          pushURL(); render();
        });
      });

      const searchInput = document.getElementById("search-input");
      const dropdown    = document.getElementById("tag-dropdown");

      searchInput.addEventListener("input", e => {
        state.search = e.target.value;
        pushURL(); render(); renderTagDropdown();
      });
      searchInput.addEventListener("focus", () => renderTagDropdown());
      document.addEventListener("click", e => {
        if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add("hidden");
      });

      // ── Init ──
      readURL();
      render();
    })();</script> </body> </html>
