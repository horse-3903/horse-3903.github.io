const TRACKS = [{"key":"ioai","label":"IOAI ML Notes","category":"IOAI ML Notes","accent":"#3b82f6"},{"key":"h3","label":"SMU H3 Notes","category":"SMU H3 Notes","accent":"#f59e0b"},{"key":"journals","label":"Journals","category":"Journals","accent":"#06b6d4"}];

      let activeTrack = "all";

      const trackMap = Object.fromEntries(TRACKS.map(t => [t.key, t]));

      function filtered() {
        if (activeTrack === "all") return postsData;
        const cat = trackMap[activeTrack]?.category;
        return postsData.filter(p => p.category === cat);
      }

      function groupByYear(posts) {
        const byYear = {};
        for (const p of posts) {
          if (!byYear[p.year]) byYear[p.year] = {};
          if (!byYear[p.year][p.month]) byYear[p.year][p.month] = [];
          byYear[p.year][p.month].push(p);
        }
        return Object.keys(byYear)
          .sort((a, b) => Number(b) - Number(a))
          .map(year => ({
            year,
            count: Object.values(byYear[year]).flat().length,
            months: Object.keys(byYear[year]).map(month => ({
              month,
              monthShort: byYear[year][month][0].monthShort,
              posts: byYear[year][month],
            })),
          }));
      }

      function render() {
        const posts = filtered();
        const groups = groupByYear(posts);
        const list = document.getElementById("archive-list");
        const count = document.getElementById("post-count");

        count.textContent = `${posts.length} post${posts.length !== 1 ? "s" : ""}${activeTrack !== "all" ? " in " + trackMap[activeTrack].label : " total"}`;

        list.innerHTML = groups.map(({ year, count: ycount, months }) => `
          <div>
            <div class="flex items-center gap-4 mb-8">
              <h2 class="text-2xl font-bold" style="color: var(--text);">${year}</h2>
              <div class="flex-1 h-px" style="background: var(--border);"></div>
              <span class="text-xs font-mono" style="color: var(--text-muted);">${ycount} post${ycount !== 1 ? "s" : ""}</span>
            </div>
            <div class="space-y-8">
              ${months.map(({ monthShort, posts: mPosts }) => `
                <div class="grid gap-x-6 gap-y-2" style="grid-template-columns: 52px 1fr;">
                  <span class="text-xs font-mono pt-0.5" style="color: var(--text-muted);">${monthShort}</span>
                  <div class="space-y-2">
                    ${mPosts.map(p => `
                      <a href="${p.url}" class="archive-row flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background: ${p.accent};"></span>
                        <span class="text-sm archive-title" style="color: var(--text-secondary);">${p.title}</span>
                        ${activeTrack === "all" && p.category ? `<span class="text-xs font-mono ml-auto flex-shrink-0 hidden sm:block" style="color: ${p.accent}; opacity: 0.65;">${p.category}</span>` : ""}
                      </a>
                    `).join("")}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        `).join("");

        if (groups.length === 0) {
          list.innerHTML = `<p class="text-sm text-center py-8" style="color: var(--text-muted);">No posts found.</p>`;
        }
      }

      function updateButtons() {
        document.querySelectorAll(".track-btn").forEach(btn => {
          const key = btn.dataset.track;
          const isActive = key === activeTrack;
          if (isActive) {
            const accent = key === "all" ? "var(--accent)" : btn.dataset.accent;
            btn.style.background = accent;
            btn.style.color = "var(--bg)";
            btn.style.borderColor = accent;
          } else {
            btn.style.background = "var(--surface)";
            btn.style.color = "var(--text-secondary)";
            btn.style.borderColor = "var(--border)";
          }
        });
      }

      document.querySelectorAll(".track-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeTrack = btn.dataset.track;
          updateButtons();
          render();
        });

        // Hover for inactive buttons
        btn.addEventListener("mouseenter", () => {
          if (btn.dataset.track === activeTrack) return;
          const accent = btn.dataset.track === "all" ? "var(--accent)" : btn.dataset.accent;
          btn.style.borderColor = accent || "var(--accent)";
          btn.style.color = "var(--text)";
        });
        btn.addEventListener("mouseleave", () => {
          if (btn.dataset.track === activeTrack) return;
          btn.style.borderColor = "var(--border)";
          btn.style.color = "var(--text-secondary)";
        });
      });

      render();
    })();</script> </body> </html> <script type="module">const t=new IntersectionObserver(e=>e.forEach(r=>{r.isIntersecting&&(r.target.classList.add("visible"),t.unobserve(r.target))}),{threshold:.08});document.querySelectorAll("[data-reveal], [data-reveal-group]").forEach(e=>t.observe(e));</script>
